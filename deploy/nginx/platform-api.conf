# Upstream definition — where our app lives
upstream platform_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name raspberrypi.local _;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    server_tokens off;

    # Request size limit
    client_max_body_size 10M;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Health check endpoint — no logging needed
    location /health/live {
        proxy_pass http://platform_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # API routes
    location / {
        proxy_pass http://platform_api;

        # Pass real client information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # HTTP version for keepalive support
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
}
